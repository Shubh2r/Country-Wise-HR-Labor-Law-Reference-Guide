<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>HR Universe - Viewer</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root { --navy:#0a1f44; --bg:#f4f6fb; --white:#fff; }
    body { font-family: Arial, sans-serif; background:var(--bg); color:var(--navy); margin:20px; -webkit-font-smoothing:antialiased; }
    .container { max-width:900px; margin:0 auto; background:var(--white); padding:20px; border-radius:8px; box-shadow:0 6px 18px rgba(10,31,68,0.06); }
    .meta { margin-bottom:12px; display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; }
    .meta a { color:var(--navy); text-decoration:none; font-weight:700; }
    #content { line-height:1.6; }
    pre { background:#f6f8ff; padding:12px; border-radius:6px; overflow:auto; }
    code { background:#f6f8ff; padding:2px 6px; border-radius:4px; }
    img { max-width:100%; height:auto; }
  </style>
  <!-- marked.js CDN for markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="container" role="main">
    <div class="meta">
      <div><a href="portal.html">← Back to Portal</a></div>
      <div id="fileName" style="font-weight:700;"></div>
    </div>
    <div id="content">Loading...</div>
  </div>

  <script>
    // Get file query param
    function getQueryParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    async function loadFile() {
      const file = getQueryParam('file');
      const contentEl = document.getElementById('content');
      const fileNameEl = document.getElementById('fileName');
      if (!file) {
        contentEl.textContent = 'No file specified.';
        return;
      }
      fileNameEl.textContent = decodeURIComponent(file);
      try {
        // Fetch the markdown file relative to the site root
        const res = await fetch(decodeURIComponent(file));
        if (!res.ok) {
          contentEl.textContent = 'Could not load file. Check path and case sensitivity.';
          return;
        }
        const md = await res.text();
        // Render markdown using marked
        contentEl.innerHTML = marked.parse(md);
      } catch (err) {
        contentEl.textContent = 'Error loading file.';
        console.error(err);
      }
    }

    loadFile();
  </script>
</body>
</html>
