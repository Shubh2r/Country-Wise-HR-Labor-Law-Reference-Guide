<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>HR Universe - Login</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root { --navy:#0a1f44; --navy-dark:#163d7a; --bg:#f4f6fb; --white:#fff; }
    body { font-family: Arial, sans-serif; background:var(--bg); color:var(--navy); margin:0; padding:40px; -webkit-font-smoothing:antialiased; }
    .card { max-width:420px; margin:40px auto; background:var(--white); border-radius:8px; padding:24px; box-shadow:0 6px 18px rgba(10,31,68,0.08); }
    h1 { margin:0 0 8px; color:var(--navy); text-align:center; font-size:24px; }
    p.lead { margin:0 0 18px; text-align:center; color:var(--navy-dark); font-weight:600; }
    label { display:block; margin:10px 0 6px; font-weight:700; font-size:14px; }
    input[type="text"], input[type="password"] { width:100%; padding:10px; border:1px solid #d7dbe8; border-radius:6px; box-sizing:border-box; font-size:14px; }
    button { width:100%; margin-top:14px; padding:10px; background:var(--navy); color:var(--white); border:none; border-radius:6px; font-weight:700; cursor:pointer; font-size:15px; }
    .helper { margin-top:12px; text-align:center; color:#444; font-size:14px; }
    .helper a { color:var(--navy); font-weight:700; text-decoration:none; }
    .small { font-size:13px; color:#666; margin-top:10px; text-align:center; }
    .note { margin-top:12px; font-size:13px; color:#666; text-align:center; }
    .contact-row { display:flex; justify-content:center; gap:12px; margin-top:12px; align-items:center; flex-wrap:wrap; }
    .admin-link { background:transparent; border:1px solid var(--navy); color:var(--navy); padding:8px 12px; border-radius:6px; cursor:pointer; font-weight:700; text-decoration:none; }
    .admin-link:hover { background:var(--navy); color:#fff; border-color:var(--navy); }
    /* Admin modal */
    .admin-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); align-items:center; justify-content:center; z-index:9999; }
    .admin-card { background:#fff; padding:18px; border-radius:8px; max-width:420px; width:92%; box-shadow:0 8px 24px rgba(10,31,68,0.12); color:var(--navy); }
    .admin-card h3 { margin:0 0 8px; }
    .admin-card p { margin:6px 0; font-weight:600; }
    .admin-close { background:#eee; border:none; padding:8px 10px; border-radius:6px; cursor:pointer; margin-top:12px; }
  </style>
</head>
<body>
  <div class="card" role="main" aria-labelledby="title">
    <h1 id="title">HR Universe</h1>
    <p class="lead">HR &amp; Labour Guide — Login</p>

    <form id="loginForm" onsubmit="return doLogin(event)" autocomplete="off" novalidate>
      <label for="username">Username</label>
      <input id="username" name="username" type="text" required />

      <label for="password">Password</label>
      <input id="password" name="password" type="password" required />

      <button type="submit">Sign in</button>
    </form>

    <div class="helper" aria-live="polite">
      <div class="small">Don't have a login ID and password?</div>

      <div class="contact-row">
        <div style="text-align:center;">
          Kindly drop a mail to
          <div style="margin-top:6px;">
            <a href="mailto:founder.nauticaluniverse@gmail.com" class="admin-link">founder.nauticaluniverse@gmail.com</a>
          </div>
          <div class="note">Contact: Admin</div>
        </div>

        <div style="text-align:center;">
          <button class="admin-link" id="showAdminBtn" onclick="openAdminFromLogin(event)">View Admin Details</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Admin modal (login page) -->
  <div id="adminModalLogin" class="admin-modal" onclick="closeAdminLogin(event)">
    <div class="admin-card" role="dialog" aria-modal="true" onclick="event.stopPropagation()">
      <h3>Admin Details</h3>
      <p>Email: <a href="mailto:founder.nauticaluniverse@gmail.com" style="color:var(--navy); text-decoration:none;">founder.nauticaluniverse@gmail.com</a></p>
      <p>Contact Number: <span style="font-weight:800;">+91-9421166566</span></p>
      <div style="text-align:right;">
        <button class="admin-close" onclick="closeAdminLogin()">Close</button>
      </div>
    </div>
  </div>

  <script>
    // Simple client-side user store (edit as needed)
    // Add or remove users here. This is client-side only.
    const users = {
      "shubh": "mypassword",
      "hrteam": "secure123",
      "guest": "guest123"
    };

    function doLogin(e) {
      e.preventDefault();
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;
      if (users[u] && users[u] === p) {
        // successful login — redirect to portal
        window.location.href = 'portal.html';
      } else {
        alert('Invalid credentials. If you do not have an account, kindly email founder.nauticaluniverse@gmail.com');
      }
      return false;
    }

    // Admin modal handlers for login page
    function openAdminFromLogin(e) {
      e.preventDefault();
      document.getElementById('adminModalLogin').style.display = 'flex';
    }
    function closeAdminLogin(e) {
      if (e && e.type === 'click' && e.target !== document.getElementById('adminModalLogin')) return;
      document.getElementById('adminModalLogin').style.display = 'none';
    }

    // Optional: allow Enter on password to submit
    document.getElementById('password').addEventListener('keyup', function(e){
      if (e.key === 'Enter') document.getElementById('loginForm').dispatchEvent(new Event('submit'));
    });
  </script>
</body>
</html>
